name: Storybook CI Pipeline

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'design-components/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/ci-storybook.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'design-components/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/ci-storybook.yml'

# Run from workspace root
jobs:
  lint:
    name: Lint Storybook Code
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install workspace dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint --workspace=design-components

      - name: Check formatting with Prettier
        run: npm run format:check --workspace=design-components

  type-check:
    name: Storybook TypeScript Type Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install workspace dependencies
        run: npm ci

      - name: Run TypeScript type check
        run: npm run typecheck --workspace=design-components

  build-storybook:
    name: Build Storybook
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install workspace dependencies
        run: npm ci

      - name: Build Storybook
        run: npm run build-storybook --workspace=design-components

      - name: Upload Storybook artifacts
        uses: actions/upload-artifact@v4
        with:
          name: storybook-static
          path: design-components/storybook-static/
          retention-days: 7

  chromatic:
    name: Visual Regression Testing
    runs-on: ubuntu-latest
    if: github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install workspace dependencies
        run: npm ci

      - name: Publish to Chromatic
        uses: chromaui/action@v1
        with:
          projectToken: ${{ secrets.CHROMATIC_PROJECT_TOKEN }}
          workingDir: design-components
          buildScriptName: build-storybook
          exitZeroOnChanges: true
          exitOnceUploaded: true

  accessibility:
    name: Accessibility Testing
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install workspace dependencies
        run: npm ci

      - name: Build Storybook
        run: npm run build-storybook --workspace=design-components

      - name: Run accessibility tests
        run: |
          npx concurrently -k -s first -n "SB,A11Y" -c "magenta,blue" \
            "npx http-server design-components/storybook-static --port 6006 --silent" \
            "npx wait-on http://localhost:6006 && npx storybook-addon-a11y-report"
        continue-on-error: true

  security-scan:
    name: Storybook Security Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Run npm audit
        run: npm audit --audit-level=high
        continue-on-error: true

      - name: Check for security vulnerabilities
        run: |
          audit_output=$(npm audit --json)
          high_vulns=$(echo "$audit_output" | jq '.metadata.vulnerabilities.high // 0')
          critical_vulns=$(echo "$audit_output" | jq '.metadata.vulnerabilities.critical // 0')

          echo "## Security Scan Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "$critical_vulns" -gt 0 ]; then
            echo "❌ Found $critical_vulns critical vulnerabilities" >> $GITHUB_STEP_SUMMARY
            exit 1
          elif [ "$high_vulns" -gt 0 ]; then
            echo "⚠️ Found $high_vulns high vulnerabilities" >> $GITHUB_STEP_SUMMARY
            exit 0
          else
            echo "✅ No high or critical vulnerabilities found" >> $GITHUB_STEP_SUMMARY
          fi

  storybook-checks-complete:
    name: Storybook All Checks Passed
    needs: [lint, type-check, build-storybook, accessibility, security-scan]
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Summary
        run: |
          echo "## Storybook CI Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "${{ needs.lint.result }}" == "success" ] && \
             [ "${{ needs.type-check.result }}" == "success" ] && \
             [ "${{ needs.build-storybook.result }}" == "success" ] && \
             [ "${{ needs.accessibility.result }}" == "success" ] && \
             [ "${{ needs.security-scan.result }}" == "success" ]; then
            echo "✅ **All Storybook CI checks passed successfully!**" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ **Some Storybook CI checks failed**" >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Linting | ${{ needs.lint.result == 'success' && '✅' || '❌' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Type Checking | ${{ needs.type-check.result == 'success' && '✅' || '❌' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Build | ${{ needs.build-storybook.result == 'success' && '✅' || '❌' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Accessibility | ${{ needs.accessibility.result == 'success' && '✅' || '❌' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Security | ${{ needs.security-scan.result == 'success' && '✅' || '❌' }} |" >> $GITHUB_STEP_SUMMARY
