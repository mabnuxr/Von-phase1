name: App CI Pipeline

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'app/**'
      - 'design-components/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/ci-app.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'app/**'
      - 'design-components/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/ci-app.yml'

# Run from workspace root
jobs:
  lint:
    name: Lint App Code
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install workspace dependencies
        run: npm ci

      - name: Run ESLint on all workspaces
        run: npm run lint:all

      - name: Check formatting with Prettier on all workspaces
        run: npm run format:check:all

  type-check:
    name: TypeScript Type Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install workspace dependencies
        run: npm ci

      - name: Run TypeScript type check on all workspaces
        run: npm run typecheck:all

  build:
    name: Build App
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install workspace dependencies
        run: npm ci

      - name: Build design-components library
        run: npm run build:design
        env:
          NODE_OPTIONS: '--max-old-space-size=4096'

      - name: Build application
        run: npm run build:app
        env:
          NODE_OPTIONS: '--max-old-space-size=4096'
          NODE_ENV: production
          VITE_API_BASE_URL: https://apiv2.vonlabs.ai
          VITE_SCALEKIT_CLIENT_ID: ${{ secrets.VITE_SCALEKIT_CLIENT_ID }}
          VITE_SCALEKIT_AUTH_BASE_URL: ${{ secrets.VITE_SCALEKIT_AUTH_BASE_URL }}
          VITE_SCALEKIT_AUTH_AUTHORIZE_PATH: /oauth/authorize
          VITE_SCALEKIT_AUTH_TOKEN_PATH: /oauth/token
          VITE_SCALEKIT_AUTH_LOGOUT_PATH: ''
          VITE_SCALEKIT_REDIRECT_URI: https://app.vonlabs.ai/callback

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: app-dist
          path: app/dist/
          retention-days: 7

  bundle-size:
    name: Check App Bundle Size
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install workspace dependencies
        run: npm ci

      - name: Build design-components library
        run: npm run build:design
        env:
          NODE_OPTIONS: '--max-old-space-size=4096'

      - name: Build for production
        run: npm run build:app
        env:
          NODE_OPTIONS: '--max-old-space-size=4096'
          NODE_ENV: production
          VITE_API_BASE_URL: https://apiv2.vonlabs.ai
          VITE_SCALEKIT_CLIENT_ID: dummy_client_id
          VITE_SCALEKIT_AUTH_BASE_URL: https://dummy.scalekit.dev
          VITE_SCALEKIT_AUTH_AUTHORIZE_PATH: /oauth/authorize
          VITE_SCALEKIT_AUTH_TOKEN_PATH: /oauth/token
          VITE_SCALEKIT_AUTH_LOGOUT_PATH: /oauth/logout
          VITE_SCALEKIT_REDIRECT_URI: http://localhost:5173/callback

      - name: Check bundle size
        run: |
          echo "## App Bundle Size Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| File | Size |" >> $GITHUB_STEP_SUMMARY
          echo "|------|------|" >> $GITHUB_STEP_SUMMARY
          find app/dist/assets -type f \( -name "*.js" -o -name "*.css" \) | while read file; do
            size=$(du -h "$file" | cut -f1)
            filename=$(basename "$file")
            echo "| $filename | $size |" >> $GITHUB_STEP_SUMMARY
          done

          main_bundle=$(find app/dist/assets -name "index-*.js" | head -1)
          if [ -f "$main_bundle" ]; then
            size_kb=$(du -k "$main_bundle" | cut -f1)
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**Main bundle size:** $size_kb KB" >> $GITHUB_STEP_SUMMARY
            if [ "$size_kb" -gt 500 ]; then
              echo "⚠️ **Warning:** Main bundle size ($size_kb KB) exceeds 500KB threshold" >> $GITHUB_STEP_SUMMARY
            else
              echo "✅ **Success:** Bundle size is within limits" >> $GITHUB_STEP_SUMMARY
            fi
          fi

  security-scan:
    name: App Security Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Run npm audit
        run: npm audit --audit-level=high
        continue-on-error: true

      - name: Check for security vulnerabilities
        run: |
          # Known exceptions (no fix available):
          # - prismjs <1.30.0 (moderate) - DOM Clobbering vulnerability via refractor -> react-syntax-highlighter -> @crayonai/react-ui

          audit_output=$(npm audit --json 2>/dev/null || echo '{"metadata":{"vulnerabilities":{}}}')
          high_vulns=$(echo "$audit_output" | jq '.metadata.vulnerabilities.high // 0')
          critical_vulns=$(echo "$audit_output" | jq '.metadata.vulnerabilities.critical // 0')
          moderate_vulns=$(echo "$audit_output" | jq '.metadata.vulnerabilities.moderate // 0')

          echo "## Security Scan Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "$critical_vulns" -gt 0 ]; then
            echo "❌ Found $critical_vulns critical vulnerabilities" >> $GITHUB_STEP_SUMMARY
            exit 1
          elif [ "$high_vulns" -gt 0 ]; then
            echo "⚠️ Found $high_vulns high vulnerabilities" >> $GITHUB_STEP_SUMMARY
            exit 1
          else
            echo "✅ No high or critical vulnerabilities found" >> $GITHUB_STEP_SUMMARY
            if [ "$moderate_vulns" -gt 0 ]; then
              echo "" >> $GITHUB_STEP_SUMMARY
              echo "ℹ️ Found $moderate_vulns moderate vulnerabilities (known exceptions, no fix available)" >> $GITHUB_STEP_SUMMARY
            fi
          fi

  app-checks-complete:
    name: App All Checks Passed
    needs: [lint, type-check, build, bundle-size, security-scan]
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Summary
        run: |
          echo "## App CI Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "${{ needs.lint.result }}" == "success" ] && \
             [ "${{ needs.type-check.result }}" == "success" ] && \
             [ "${{ needs.build.result }}" == "success" ] && \
             [ "${{ needs.bundle-size.result }}" == "success" ] && \
             [ "${{ needs.security-scan.result }}" == "success" ]; then
            echo "✅ **All App CI checks passed successfully!**" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ **Some App CI checks failed**" >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Linting | ${{ needs.lint.result == 'success' && '✅' || '❌' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Type Checking | ${{ needs.type-check.result == 'success' && '✅' || '❌' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Build | ${{ needs.build.result == 'success' && '✅' || '❌' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Bundle Size | ${{ needs.bundle-size.result == 'success' && '✅' || '❌' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Security | ${{ needs.security-scan.result == 'success' && '✅' || '❌' }} |" >> $GITHUB_STEP_SUMMARY
