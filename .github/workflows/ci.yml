name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop, storybook-implementation ]
  pull_request:
    branches: [ main, develop ]

env:
  NODE_ENV: test

jobs:
  # Job 1: Linting and Formatting
  lint:
    name: Lint & Format Check
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'
        cache-dependency-path: design-components/package-lock.json

    - name: Install dependencies
      working-directory: design-components
      run: npm ci
    
    - name: Run TypeScript type checking
      working-directory: design-components
      run: npm run typecheck
    
    - name: Run ESLint
      working-directory: design-components
      run: npm run lint -- --max-warnings=0
    
    - name: Check Prettier formatting
      working-directory: design-components
      run: npm run format:check

  # Job 2: Testing
  test:
    name: Test (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        node-version: [18.x, 20.x]
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
        cache-dependency-path: design-components/package-lock.json

    - name: Install dependencies
      working-directory: design-components
      run: npm ci
    
    - name: Run tests with coverage threshold
      working-directory: design-components
      run: npm run ci:test
    
    - name: Upload coverage reports
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: coverage-node-${{ matrix.node-version }}
        path: design-components/coverage/
        retention-days: 30
    
    - name: Coverage summary
      if: matrix.node-version == '20.x'
      working-directory: design-components
      run: |
        echo "## Coverage Report" >> $GITHUB_STEP_SUMMARY
        echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
        npx jest --coverage --silent --coverageReporters=text-summary | tail -n +2 >> $GITHUB_STEP_SUMMARY
        echo "\`\`\`" >> $GITHUB_STEP_SUMMARY

  # Job 3: Build
  build:
    name: Build & Bundle
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'
        cache-dependency-path: design-components/package-lock.json

    - name: Install dependencies
      working-directory: design-components
      run: npm ci
    
    - name: Build project
      working-directory: design-components
      run: npm run build
    
    - name: Check bundle size
      working-directory: design-components
      run: |
        echo "## Bundle Size Report" >> $GITHUB_STEP_SUMMARY
        echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
        ls -lh dist/assets/*.js | awk '{print $9 ": " $5}' >> $GITHUB_STEP_SUMMARY
        echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
        
        # Fail if main bundle exceeds 400KB
        MAIN_BUNDLE_SIZE=$(stat -c%s dist/assets/index-*.js 2>/dev/null || stat -f%z dist/assets/index-*.js 2>/dev/null || echo 0)
        if [ "$MAIN_BUNDLE_SIZE" -gt 409600 ]; then
          echo "❌ Main bundle exceeds 400KB limit (current: $((MAIN_BUNDLE_SIZE / 1024))KB)"
          exit 1
        fi
    
    - name: Build Storybook
      working-directory: design-components
      run: npm run build-storybook
    
    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: build-artifacts
        path: |
          design-components/dist/
          design-components/storybook-static/
        retention-days: 7

  # Job 4: Security Check
  security:
    name: Security Audit
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'
        cache-dependency-path: design-components/package-lock.json
    
    - name: Run npm audit
      working-directory: design-components
      run: |
        npm audit --audit-level=moderate || true
        echo "## Security Audit" >> $GITHUB_STEP_SUMMARY
        echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
        npm audit --audit-level=moderate 2>&1 | head -20 >> $GITHUB_STEP_SUMMARY || true
        echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
    
    - name: Check for outdated packages
      working-directory: design-components
      run: |
        echo "## Outdated Packages" >> $GITHUB_STEP_SUMMARY
        echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
        npm outdated || true >> $GITHUB_STEP_SUMMARY
        echo "\`\`\`" >> $GITHUB_STEP_SUMMARY

  # Final job that runs after all parallel jobs
  all-checks:
    name: All Checks Passed
    runs-on: ubuntu-latest
    needs: [lint, test, build, security]
    if: always()
    
    steps:
    - name: Check job results
      run: |
        if [[ "${{ needs.lint.result }}" != "success" || 
              "${{ needs.test.result }}" != "success" || 
              "${{ needs.build.result }}" != "success" ]]; then
          echo "❌ One or more required checks failed"
          exit 1
        fi
        echo "✅ All required checks passed successfully!"
        
        if [[ "${{ needs.security.result }}" != "success" ]]; then
          echo "⚠️ Security check failed (non-blocking)"
        fi