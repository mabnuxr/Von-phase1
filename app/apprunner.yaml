version: 1.0
runtime: nodejs22
build:
  commands:
    pre-build:
      - echo CHECKING BUILD ENV VARS
      - printenv | grep VITE_ || echo No VITE_ vars found
      - printenv | grep NODE_ENV || echo NODE_ENV not set
    build:
      - echo Creating .env file for build
      - echo "VITE_SCALEKIT_CLIENT_ID=prd_skc_89676802255028999" > .env
      - echo "VITE_SCALEKIT_AUTH_BASE_URL=https://auth.vonlabs.ai" >> .env
      - echo "VITE_SCALEKIT_AUTH_AUTHORIZE_PATH=/oauth/authorize" >> .env
      - echo "VITE_SCALEKIT_AUTH_TOKEN_PATH=/oauth/token" >> .env
      - echo "VITE_SCALEKIT_AUTH_LOGOUT_PATH=" >> .env
      - cat .env
      - npm ci
      - npm run build
    post-build:
      - echo CHECKING BUILT FILES
      - ls -la dist/
      - grep -r VITE_SCALEKIT dist/ || echo No VITE vars found in build
      - echo CHECKING FOR CLIENT ID IN BUILD
      - grep -r "prd_skc_89676802255028999" dist/ | head -5 || echo Client ID not found in build
      - echo CHECKING FOR AUTH URL IN BUILD
      - grep -r "auth.vonlabs.ai" dist/ | head -5 || echo Auth URL not found in build
  env:
    - name: NODE_ENV
      value: production
    - name: VITE_SCALEKIT_AUTH_AUTHORIZE_PATH
      value: /oauth/authorize
    - name: VITE_SCALEKIT_AUTH_BASE_URL
      value: https://auth.vonlabs.ai
    - name: VITE_SCALEKIT_AUTH_LOGOUT_PATH
      value: /oauth/logout
    - name: VITE_SCALEKIT_AUTH_TOKEN_PATH
      value: /oauth/token
    - name: VITE_SCALEKIT_CLIENT_ID
      value: prd_skc_89676802255028999
run:
  runtime-version: 22.17.0
  command: npm run preview
  network:
    port: 4173
    env: PORT
