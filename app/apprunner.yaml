version: 1.0
runtime: nodejs22
build:
  commands:
    pre-build:
      - cd .. && echo CHECKING BUILD ENV VARS
      - cd .. && printenv | grep VITE_ || echo No VITE_ vars found
      - cd .. && printenv | grep NODE_ENV || echo NODE_ENV not set
    build:
      - cd .. && echo Creating .env file for build at workspace root
      - cd .. && echo "VITE_SCALEKIT_CLIENT_ID=prd_skc_89676802255028999" > .env
      - cd .. && echo "VITE_SCALEKIT_AUTH_BASE_URL=https://auth.vonlabs.ai" >> .env
      - cd .. && echo "VITE_SCALEKIT_AUTH_AUTHORIZE_PATH=/oauth/authorize" >> .env
      - cd .. && echo "VITE_SCALEKIT_AUTH_TOKEN_PATH=/oauth/token" >> .env
      - cd .. && echo "VITE_SCALEKIT_AUTH_LOGOUT_PATH=" >> .env
      - cd .. && cat .env
      - cd .. && echo Installing workspace dependencies
      - cd .. && npm ci
      - cd .. && echo Building design-components library
      - cd .. && npm run build:design
      - cd .. && echo Building app
      - cd .. && npm run build:app
    post-build:
      - cd .. && echo CHECKING BUILT FILES
      - cd .. && ls -la app/dist/
      - cd .. && grep -r VITE_SCALEKIT app/dist/ || echo No VITE vars found in build
      - cd .. && echo CHECKING FOR CLIENT ID IN BUILD
      - cd .. && grep -r "prd_skc_89676802255028999" app/dist/ | head -5 || echo Client ID not found in build
      - cd .. && echo CHECKING FOR AUTH URL IN BUILD
      - cd .. && grep -r "auth.vonlabs.ai" app/dist/ | head -5 || echo Auth URL not found in build
  env:
    - name: NODE_ENV
      value: production
    - name: VITE_SCALEKIT_AUTH_AUTHORIZE_PATH
      value: /oauth/authorize
    - name: VITE_SCALEKIT_AUTH_BASE_URL
      value: https://auth.vonlabs.ai
    - name: VITE_SCALEKIT_AUTH_LOGOUT_PATH
      value: /oauth/logout
    - name: VITE_SCALEKIT_AUTH_TOKEN_PATH
      value: /oauth/token
    - name: VITE_SCALEKIT_CLIENT_ID
      value: prd_skc_89676802255028999
run:
  runtime-version: 22.17.0
  command: cd .. && npm run preview --workspace=app
  network:
    port: 4173
    env: PORT
