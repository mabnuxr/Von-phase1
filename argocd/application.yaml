apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: revenue-os-frontend
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: revenue-os
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: vonlabs
  source:
    repoURL: 814314855241.dkr.ecr.us-west-2.amazonaws.com/helm-charts
    chart: revenue-os-frontend
    targetRevision: 0.1.0-bootstrap
    helm:
      releaseName: revenue-os-frontend
      valueFiles:
        - values.yaml
        - values-production.yaml
      # Rollback: re-run argocd-deploy.yml with a previous commit SHA input.
      parameters:
        - name: image.tag
          value: bootstrap

  destination:
    server: https://kubernetes.default.svc
    namespace: revenue-os

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
      - PruneLast=true
      - ApplyOutOfSyncOnly=true
      - ServerSideApply=true
    retry:
      limit: 5
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 5m
  revisionHistoryLimit: 10
