name: Test Suite

on:
  push:
    branches: [ main, develop, storybook-implementation ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js 20.x
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'
        cache-dependency-path: design-components/package-lock.json
        
    - name: Verify Node.js version
      run: node --version
        
    - name: Clear npm cache
      run: npm cache clean --force
      
    - name: Install dependencies
      working-directory: design-components
      run: npm ci
      
    - name: Run linter
      working-directory: design-components
      run: npm run lint
      
    - name: Run Jest tests
      working-directory: design-components
      run: npm test
      
    - name: Build project
      working-directory: design-components
      run: npm run build
      
    - name: Build Storybook
      working-directory: design-components
      run: npm run build-storybook
      
    - name: Upload test results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-results-node-20
        path: design-components/coverage/
        retention-days: 30

