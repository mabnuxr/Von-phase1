name: CI

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "**" ]

jobs:
  install:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: design-components/package-lock.json
      - name: Install dependencies
        working-directory: design-components
        run: npm ci --no-audit --no-fund

  lint:
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: design-components/package-lock.json
      - name: Install dependencies
        working-directory: design-components
        run: npm ci --no-audit --no-fund
      - name: Lint and format check
        working-directory: design-components
        run: npm run ci:lint

  typecheck:
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: design-components/package-lock.json
      - name: Install dependencies
        working-directory: design-components
        run: npm ci --no-audit --no-fund
      - name: TypeScript typecheck
        working-directory: design-components
        run: npm run typecheck

  test:
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: design-components/package-lock.json
      - name: Install dependencies
        working-directory: design-components
        run: npm ci --no-audit --no-fund
      - name: Run tests with coverage
        working-directory: design-components
        run: npm run ci:test

  build:
    runs-on: ubuntu-latest
    needs: [typecheck]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: design-components/package-lock.json
      - name: Install dependencies
        working-directory: design-components
        run: npm ci --no-audit --no-fund
      - name: Build package
        working-directory: design-components
        run: npm run build

  storybook:
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: design-components/package-lock.json
      - name: Install dependencies
        working-directory: design-components
        run: npm ci --no-audit --no-fund
      - name: Build Storybook
        working-directory: design-components
        run: npm run build-storybook


