version: 1.0
runtime: nodejs22

build:
  commands:
    build:
      - sh -c "cd .. && echo Installing workspace dependencies && npm ci && echo Building Storybook && npm run build-storybook --workspace=design-components"

run:
  runtime-version: 22.17.0
  command: sh -c "cd .. && npx serve design-components/storybook-static"
  network:
    port: 3000
    env: PORT
